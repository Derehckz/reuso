services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Solo localhost — nunca 0.0.0.0:5432 (expone Postgres a internet / ransomware)
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      # Misma contraseña que en DATABASE_URL (.env del VPS). No uses "postgres" en producción.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: reuso
    volumes:
      - reuso_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reuso"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  reuso_pg_data:
