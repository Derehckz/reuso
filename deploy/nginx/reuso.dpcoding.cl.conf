# reuso.dpcoding.cl — Cloudflare Full (strict) + certificado origen (como reservas.dpcoding.cl)
# Next.js PM2 en 127.0.0.1:3010

upstream reuso_next {
    server 127.0.0.1:3010;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name reuso.dpcoding.cl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name reuso.dpcoding.cl;

    ssl_certificate     /etc/nginx/ssl/dpcoding.cl.crt;
    ssl_certificate_key /etc/nginx/ssl/dpcoding.cl.key;

    client_max_body_size 20M;

    location / {
        proxy_pass http://reuso_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
